apiVersion: v1
kind: Namespace
metadata:
  name: static-pages
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portfolio
  namespace: static-pages
  labels:
    app: portfolio
spec:
  replicas: 1
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
        - name: portfolio
          image: ghcr.io/sirius0xdev/hermes_workspace:portfolio
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: portfolio
  namespace: static-pages
  labels:
    app: portfolio
spec:
  selector:
    app: portfolio
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

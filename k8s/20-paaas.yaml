apiVersion: apps/v1
kind: Deployment
metadata:
  name: paaas
  namespace: static-pages
  labels:
    app: paaas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: paaas
  template:
    metadata:
      labels:
        app: paaas
    spec:
      containers:
        - name: paaas
          image: ghcr.io/sirius0xdev/hermes_workspace:paaas
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: paaas
  namespace: static-pages
  labels:
    app: paaas
spec:
  selector:
    app: paaas
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP

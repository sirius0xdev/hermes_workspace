name: CD - PaaAS Landing Page

on:
  push:
    branches: [ "main" ]
    paths:
      - 'index.html'
      - 'Dockerfile.paaas'
      - '.github/workflows/cd-paaas-landing.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/sirius0xdev/hermes_workspace
          tags: |
            type=raw,value=paaas-landing
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.paaas
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make GHCR package publicly accessible
        run: |
          echo "Ensuring GHCR package hermes_workspace is public..."
          gh api --method PATCH /user/packages/container/hermes_workspace -f visibility=public || echo "Package visibility update skipped (package may not exist yet or is already public)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
